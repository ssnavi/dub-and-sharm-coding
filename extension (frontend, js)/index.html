<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>YouTube Topic Blocker</title>
  <style>
    body {
      width: 250px;
      font-family: Arial, sans-serif;
      padding: 15px;
      margin: 0;
    }
    h3 {
      margin-top: 0;
      color: #333;
    }
    .input-container {
      display: flex;
      gap: 5px;
      margin-bottom: 15px;
    }
    input {
      flex: 1;
      padding: 6px;
      border: 1px solid #ccc;
      border-radius: 4px;
    }
    button {
      padding: 6px 12px;
      background-color: #ff0000;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    button:hover {
      background-color: #cc0000;
    }
    /* Style for the tags the user adds */
    #tag-container {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 12px;
    }
    .category-tag {
      background-color: #e0e0e0;
      padding: 4px 8px;
      border-radius: 12px;
      font-size: 13px;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .remove-tag {
      color: #888;
      cursor: pointer;
      font-weight: bold;
      border: none;
      background: transparent;
      padding: 0 4px;
    }
    .remove-tag:hover {
      color: #ff0000;
    }
    select {
      width: 100%;
      padding: 6px;
      border: 1px solid #ccc;
      border-radius: 4px;
      margin-bottom: 8px;
      background: white;
    }
    #settings-info {
      font-size: 12px;
      color: #555;
      margin-bottom: 12px;
    }
    details {
      border: 1px solid #ddd;
      border-radius: 6px;
      margin-bottom: 12px;
      padding: 8px;
    }
    summary {
      cursor: pointer;
      font-size: 13px;
      font-weight: bold;
      color: #333;
    }
    .site-toggle {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      font-size: 13px;
      margin-top: 8px;
    }
    .site-toggle input {
      flex: 0 0 auto;
    }
  </style>
</head>
<body>

  <h3>Category Filter</h3>

  <details>
    <summary>Allow education links</summary>
    <label class="site-toggle">
      <span>Canvas</span>
      <input type="checkbox" data-education-site="canvas">
    </label>
    <label class="site-toggle">
      <span>Google Classroom</span>
      <input type="checkbox" data-education-site="googleClassroom">
    </label>
    <label class="site-toggle">
      <span>Schoology</span>
      <input type="checkbox" data-education-site="schoology">
    </label>
  </details>

  <select id="mode-select">
    <option value="block">Block categories</option>
    <option value="allow_only">Allow only these categories</option>
  </select>

  <div id="settings-info">Videos matching blocked categories will be hidden.</div>
  
  <div class="input-container">
    <input type="text" id="category-input" placeholder="e.g., Gaming, Cooking">
    <button id="add-btn">Add</button>
  </div>

  <div id="tag-container"></div>

  <script src="popup.js"></script>
</body>
</html>
