<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>YouTube Topic Blocker</title>
  <style>
    body {
      width: 250px;
      font-family: Arial, sans-serif;
      padding: 15px;
      margin: 0;
    }
    h3 {
      margin-top: 0;
      color: #333;
    }
    .input-container {
      display: flex;
      gap: 5px;
      margin-bottom: 15px;
    }
    input {
      flex: 1;
      padding: 6px;
      border: 1px solid #ccc;
      border-radius: 4px;
    }
    button {
      padding: 6px 12px;
      background-color: #ff0000;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    button:hover {
      background-color: #cc0000;
    }
    /* Style for the tags the user adds */
    #tag-container {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .tag {
      background-color: #e0e0e0;
      padding: 4px 8px;
      border-radius: 12px;
      font-size: 13px;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .remove-btn {
      color: #888;
      cursor: pointer;
      font-weight: bold;
    }
    .remove-btn:hover {
      color: #ff0000;
    }
  </style>
</head>
<body>

  <h3>Block Categories</h3>
  
  <div class="input-container">
    <input type="text" id="category-input" placeholder="e.g., Gaming, Cooking">
    <button id="add-btn">Add</button>
  </div>

  <div id="tag-container"></div>

  <script src="popup.js"></script>
</body>
</html>
